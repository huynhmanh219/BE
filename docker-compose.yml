version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: tarot-postgres
    restart: always
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
      POSTGRES_DB: tarot_db
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
